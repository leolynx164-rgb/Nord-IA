<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nørd AI — Assistant Intelligent</title>
<meta name="description" content="Assistant IA scandinave avec modes texte, débat, canvas, recherche et vocal.">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF8F5;--fg:#1f2937;--card:#F5F2EE;--card-fg:#1f2937;
  --primary:hsl(152,25%,42%);--primary-fg:#FAF8F5;
  --muted:#6b7280;--border:#E8E4DF;--accent:hsl(152,20%,90%);
  --accent-fg:hsl(152,25%,30%);--destructive:#dc2626;
  --ai-bubble:hsl(152,18%,94%);--user-bubble:hsl(152,25%,42%);
  --sidebar-bg:#F5F2EE;--sidebar-border:#E8E4DF;
  --radius:0.75rem;--orb-glow:hsl(152,40%,55%);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
h1,h2,h3,h4{font-family:'DM Serif Display',serif;font-weight:400}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:var(--fg)}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.flex-1{flex:1;min-width:0;min-height:0}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hidden{display:none!important}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .3s ease}
.sidebar.closed{margin-left:-280px}
.sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sidebar-border)}
.sidebar-header h2{font-size:1.1rem}
.sidebar-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin}
.sidebar-footer{padding:12px;border-top:1px solid var(--sidebar-border)}
.conv-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:.875rem;transition:background .15s}
.conv-item:hover,.conv-item.active{background:var(--accent)}
.conv-item .actions{display:none;gap:4px;margin-left:auto}
.conv-item:hover .actions{display:flex}
.icon-btn{padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:var(--accent)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:8px}
.toggle-sidebar-btn{position:fixed;top:16px;left:16px;z-index:100;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border)}

/* Mode selector */
.mode-tabs{display:flex;gap:4px;padding:4px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.mode-tab{padding:8px 14px;border-radius:8px;font-size:.875rem;font-weight:500;color:var(--muted);transition:all .2s;position:relative}
.mode-tab.active{background:var(--primary);color:var(--primary-fg)}
.mode-tab:hover:not(.active){color:var(--fg)}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin}
.messages-inner{max-width:700px;margin:0 auto}
.empty-state{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center}
.empty-icon{width:64px;height:64px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.5rem}

/* Message bubbles */
.msg-row{display:flex;margin-bottom:12px;gap:10px}
.msg-row.user{justify-content:flex-end;flex-direction:row-reverse}
.msg-row.user .bubble{background:var(--user-bubble);color:var(--primary-fg);border-radius:16px 16px 4px 16px}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.msg-row.ai .msg-avatar{background:var(--ai-bubble)}
.msg-row.user .msg-avatar{background:var(--user-bubble);color:var(--primary-fg)}
.bubble{padding:12px 16px;border-radius:16px 16px 16px 4px;font-size:.875rem;line-height:1.6;max-width:80%;white-space:pre-wrap;background:var(--ai-bubble)}
.msg-actions{display:flex;gap:4px;margin-top:4px}
.msg-actions button{padding:4px;border-radius:6px;color:var(--muted);font-size:.75rem}
.msg-actions button:hover{background:var(--accent)}
.typing-dots{display:flex;gap:6px;padding:4px}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);opacity:.4;animation:tdot 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* ── Rich rendering ── */
.bubble{white-space:normal}
.bubble p{margin:0 0 .5em}.bubble p:last-child{margin-bottom:0}
.bubble ul,.bubble ol{padding-left:1.4em;margin:.3em 0}.bubble li{margin:.15em 0}
.bubble strong{font-weight:600}.bubble em{font-style:italic}.bubble del{opacity:.65}
.bubble h1,.bubble h2,.bubble h3{font-family:'DM Serif Display',serif;margin:.7em 0 .3em;line-height:1.3}
.bubble h1{font-size:1.2em}.bubble h2{font-size:1.05em}.bubble h3{font-size:.95em;font-weight:600}
.bubble hr{border:none;border-top:1px solid var(--border);margin:.6em 0}
.bubble blockquote{border-left:3px solid var(--primary);padding:.3em .8em;margin:.4em 0;color:var(--muted);font-style:italic}
.bubble table{border-collapse:collapse;font-size:.8em;margin:.5em 0;width:100%}
.bubble th,.bubble td{padding:5px 10px;border:1px solid var(--border);text-align:left}
.bubble th{background:var(--accent);font-weight:600}
.bubble code{font-family:'Fira Code','Cascadia Code',monospace;font-size:.82em;background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.08);border-radius:4px;padding:1px 5px}
.msg-row.user .bubble code{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.2)}
.bubble a.rl{color:var(--primary);text-decoration:none;border-bottom:1px dotted;word-break:break-all}
.bubble a.rl:hover{opacity:.75}
.msg-row.user .bubble a.rl{color:#c5e8d5}

/* Code block */
.code-block{margin:10px 0;border-radius:10px;overflow:hidden;border:1px solid #313244;background:#1e1e2e;font-family:'Fira Code','Cascadia Code',monospace;font-size:.78rem}
.code-block-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#2a2a3e;border-bottom:1px solid #313244}
.code-lang{font-size:.68rem;color:#7c85b0;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.code-block-actions{display:flex;gap:6px}
.code-copy-btn,.code-preview-btn{padding:3px 10px;border-radius:5px;font-size:.7rem;cursor:pointer;transition:all .15s;font-weight:500;border:none}
.code-copy-btn{background:rgba(255,255,255,.07);color:#a0a8c0}
.code-copy-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.code-preview-btn{background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.code-preview-btn:hover{background:rgba(99,102,241,.4);color:#e0e7ff}
.code-block pre{margin:0;padding:14px 16px;overflow-x:auto;line-height:1.65;color:#cdd6f4}
.tok-k{color:#cba6f7}.tok-s{color:#a6e3a1}.tok-c{color:#585b70;font-style:italic}
.tok-n{color:#fab387}.tok-t{color:#89dceb}.tok-a{color:#89b4fa}

/* HTML preview */
.html-preview-wrap{margin:8px 0;border-radius:10px;overflow:hidden;border:1px solid rgba(99,102,241,.3)}
.html-preview-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#2a2a3e;font-size:.72rem;color:#a5b4fc}
.pbar-dots{display:flex;gap:5px}
.pbar-dot{width:10px;height:10px;border-radius:50%}
.html-preview-wrap iframe{width:100%;border:none;display:block;min-height:180px}

/* YouTube */
.yt-wrap{position:relative;margin:10px 0;border-radius:12px;overflow:hidden;border:1px solid var(--border);max-width:520px;box-shadow:0 4px 16px rgba(0,0,0,.1);padding-bottom:56.25%;height:0}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block}

/* Shortcuts bar */
.shortcut-bar{display:flex;gap:6px;padding:6px 16px 0;max-width:700px;margin:0 auto;flex-wrap:wrap}
.sc-btn{padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.sc-btn:hover{background:var(--accent);color:var(--fg);border-color:var(--primary)}
.sc-btn.tag{background:var(--accent);color:var(--accent-fg);border-color:var(--primary)}

/* QCM */
.qcm-wrap{display:flex;flex-direction:column;gap:16px;margin:4px 0}
.qcm-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px}
.qcm-q{font-weight:600;margin-bottom:10px;font-size:.9em;line-height:1.4}
.qcm-opts{display:flex;flex-direction:column;gap:6px}
.qcm-opt{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.85em;text-align:left;transition:all .2s;width:100%}
.qcm-opt:hover:not([disabled]){border-color:var(--primary);background:var(--accent)}
.qcm-opt.correct{background:#dcfce7!important;border-color:#16a34a!important;color:#15803d!important}
.qcm-opt.wrong{background:#fee2e2!important;border-color:#dc2626!important;color:#dc2626!important}
.qcm-expl{font-size:.8em;color:var(--muted);margin-top:8px;padding:8px;background:var(--accent);border-radius:6px;display:none}
.qcm-score-bar{margin-top:8px;padding:10px 14px;border-radius:8px;background:var(--accent);font-size:.85em;font-weight:600;text-align:center;display:none;border:1px solid var(--border)}

/* Themes */
body.th-dark{--bg:#16213e;--fg:#e2e8f0;--card:#1a2540;--primary:hsl(152,40%,50%);--primary-fg:#fff;--muted:#94a3b8;--border:#2d3a50;--accent:hsl(152,18%,18%);--accent-fg:hsl(152,40%,70%);--ai-bubble:hsl(152,15%,20%);--user-bubble:hsl(152,38%,28%);--sidebar-bg:#1a2540;--sidebar-border:#2d3a50}
body.th-blue{--bg:#f0f4ff;--fg:#1e3a5f;--card:#e8eeff;--primary:hsl(220,70%,50%);--primary-fg:#fff;--muted:#64748b;--border:#c7d7f5;--accent:hsl(220,50%,90%);--accent-fg:hsl(220,70%,35%);--ai-bubble:hsl(220,40%,93%);--user-bubble:hsl(220,70%,50%);--sidebar-bg:#e8eeff;--sidebar-border:#c7d7f5}
body.th-violet{--bg:#f5f0ff;--fg:#2d1b5e;--card:#ede8ff;--primary:hsl(270,65%,55%);--primary-fg:#fff;--muted:#7c6fa0;--border:#d8ccf5;--accent:hsl(270,40%,92%);--accent-fg:hsl(270,65%,35%);--ai-bubble:hsl(270,30%,93%);--user-bubble:hsl(270,65%,55%);--sidebar-bg:#ede8ff;--sidebar-border:#d8ccf5}
body.th-mono{--bg:#fafafa;--fg:#111;--card:#f0f0f0;--primary:#333;--primary-fg:#fff;--muted:#666;--border:#ddd;--accent:#e8e8e8;--accent-fg:#333;--ai-bubble:#ebebeb;--user-bubble:#333;--sidebar-bg:#f0f0f0;--sidebar-border:#ddd}
.theme-swatches{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.theme-sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.theme-sw.on{border-color:var(--primary);transform:scale(1.18)}

/* Image upload */
.img-prev-wrap{position:relative;display:inline-block;margin-bottom:6px}
.img-prev-wrap img{max-width:160px;max-height:120px;border-radius:8px;border:1px solid var(--border);display:block}
.img-prev-rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#dc2626;color:#fff;font-size:.65rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;line-height:1}
.bubble img.msg-img{max-width:280px;border-radius:8px;border:1px solid var(--border);display:block;margin-top:6px}

/* Export btn */
.export-btn{padding:4px 10px;border-radius:20px;font-size:.72rem;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.export-btn:hover{background:var(--accent);color:var(--fg)}

/* Input area */
.input-area{padding:16px;border-top:1px solid var(--border)}
.input-box{max-width:700px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 12px}
.input-box textarea{flex:1;border:none;background:none;resize:none;outline:none;font-size:.875rem;line-height:1.5;max-height:120px;min-height:24px}
.send-btn{padding:8px;border-radius:8px;background:var(--primary);color:var(--primary-fg);transition:opacity .15s}
.send-btn:disabled{opacity:.4}

/* Settings overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.1);max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.25rem;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.875rem;font-weight:500;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:.875rem;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{box-shadow:0 0 0 2px rgba(100,150,120,.2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{padding:10px 20px;background:var(--primary);color:var(--primary-fg);border-radius:8px;font-size:.875rem;font-weight:500;width:100%;transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.btn-outline{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:.875rem;transition:background .15s}
.btn-outline:hover{background:var(--accent)}
.link-btn{color:var(--primary);font-size:.875rem;cursor:pointer;background:none;border:none}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:white;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* ── Voice Mode — Palette orbe (rouge/violet/bleu) ── */
.voice-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  flex:1;padding:48px 24px 40px;
  /* Fond sombre teinté des couleurs de l'orbe */
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(145,71,255,.12) 0%, transparent 55%),
    radial-gradient(ellipse 70% 40% at 80% 90%, rgba(255,0,2,.10) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(59,130,246,.07) 0%, transparent 65%),
    linear-gradient(160deg,#0d0a14 0%,#100c1c 45%,#0a0d18 100%);
  position:relative;overflow:hidden;
}
/* Grain subtil façon UIVerse */
.voice-screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-conic-gradient(
    rgba(255,255,255,.015) 0.0000001%,
    rgba(220,220,230,.025) 0.000104%
  ) 60% 60% / 600% 600%;
  z-index:0;
}
/* Lueurs d'ambiance animées */
.voice-screen::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle 300px at 15% 20%, rgba(145,71,255,.08) 0%, transparent 70%),
    radial-gradient(circle 250px at 85% 80%, rgba(255,0,2,.07) 0%, transparent 70%);
  animation:ambient-shift 8s ease-in-out infinite alternate;
}
@keyframes ambient-shift{
  0%{opacity:.6;transform:scale(1)}
  100%{opacity:1;transform:scale(1.08)}
}
.voice-screen > *{position:relative;z-index:1}

/* Caller card */
.voice-caller{display:flex;flex-direction:column;align-items:center;gap:14px}
.voice-caller-avatar{
  width:90px;height:90px;border-radius:50%;
  /* Gradient reprenant rouge → violet de l'orbe */
  background:linear-gradient(135deg,#ff0002 0%,#9147ff 60%,#3b82f6 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;
  border:3px solid rgba(255,255,255,.12);
  box-shadow:
    0 0 0 6px rgba(145,71,255,.15),
    0 0 0 12px rgba(255,0,2,.06),
    0 12px 40px rgba(0,0,0,.55);
}
.voice-caller-name{
  font-family:'DM Serif Display',serif;font-size:1.5rem;
  /* Gradient texte rouge→bleu comme le titre UIVerse */
  background-image:linear-gradient(to right,#ff0002 0% 15%,#9147ff 40%,#3b82f6 70%,#ff0002 100%);
  background-clip:text;-webkit-background-clip:text;color:transparent;
  background-size:300%;
  animation:name-gradient 6s linear infinite;
}
@keyframes name-gradient{0%{background-position:0%}100%{background-position:300%}}
.voice-caller-status{
  font-size:.75rem;
  /* Couleur reprenant l'animation svg UIVerse : rouge ↔ bleu */
  color:rgba(255,255,255,.5);
  letter-spacing:.1em;text-transform:uppercase;
  animation:status-color 8s 1s infinite both;
}
@keyframes status-color{
  0%,30%{color:rgba(255,0,2,.8)}
  15%{color:rgba(59,130,246,.8)}
  50%,100%{color:rgba(255,255,255,.45)}
}

/* ── Orb UIVerse (adapted) ── */
.orb-wrap{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  position:relative;padding:40px;
}

/* Le label est l'orbe cliquable */
.orb-label{
  position:relative;
  width:64px;height:64px;
  display:flex;
  transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  cursor:pointer;
  z-index:999;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.7))
         drop-shadow(0 0 12px rgba(255,255,255,.4))
         drop-shadow(0 0 12px rgba(145,71,255,.3))
         drop-shadow(0 0 5px rgba(255,0,0,.3));
  transform:scale(1.2);
}
.orb-label:hover{
  transform:scale(1.4);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.9))
         drop-shadow(0 0 8px rgba(255,255,255,.7))
         drop-shadow(0 0 12px rgba(255,255,255,.5))
         drop-shadow(0 0 10px rgba(145,71,255,.4))
         drop-shadow(0 6px 26px rgba(255,0,0,.3));
}
.orb-label:active{transform:scale(1.1)}

/* Etat LISTENING — rouge pulsant */
.orb-label.listening{
  filter:drop-shadow(0 0 12px rgba(255,60,60,.6))
         drop-shadow(0 0 24px rgba(255,60,60,.4));
  animation:orb-label-breathe 1.1s ease-in-out infinite;
}
/* Etat PROCESSING — jaune */
.orb-label.processing{
  filter:drop-shadow(0 0 12px rgba(240,185,60,.6))
         drop-shadow(0 0 24px rgba(240,185,60,.3));
  animation:orb-label-breathe 1.6s ease-in-out infinite;
}
/* Etat SPEAKING — bleu */
.orb-label.active{
  filter:drop-shadow(0 0 12px rgba(60,165,240,.6))
         drop-shadow(0 0 24px rgba(60,165,240,.3));
  animation:orb-label-breathe 2s ease-in-out infinite;
}
@keyframes orb-label-breathe{0%,100%{transform:scale(1.2)}50%{transform:scale(1.35)}}

/* Icons (micro / close) */
.orb-icons{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:#fff;display:flex;z-index:999;
  transition:all .3s ease-in-out;
}
.orb-icons svg{width:24px;height:24px;flex-shrink:0;opacity:.8;transition:all .3s ease-in-out}
.orb-label:hover .orb-icons svg{opacity:1;filter:drop-shadow(0 0 4px #fff)}
.icon-close{opacity:0}
.orb-label.listening .icon-close,
.orb-label.processing .icon-close{opacity:1}
.orb-label.listening .icon-mic,
.orb-label.processing .icon-mic{opacity:0}

/* Ball */
.orb-ball{
  display:flex;width:64px;height:64px;flex-shrink:0;
  border-radius:50px;background-color:#ff0002;
  filter:url(#gooey);
  animation:circle2 4.2s ease-in-out infinite;
}
.orb-label.listening .orb-ball{background-color:#cc2222;animation:circle2 0.8s ease-in-out infinite}
.orb-label.processing .orb-ball{background-color:#d49520;animation:circle2 1.5s ease-in-out infinite}
.orb-label.active .orb-ball{background-color:#1a6fa0;animation:circle2 2s ease-in-out infinite}

@keyframes circle2{
  0%{transform:scale(1.5)}
  15%{transform:scale(1.53)}
  30%{transform:scale(1.48)}
  45%{transform:scale(1.44)}
  60%{transform:scale(1.47)}
  85%{transform:scale(1.53)}
  100%{transform:scale(1.5)}
}

/* Lines internes */
.orb-lines{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100px;height:100px;
  background-image:radial-gradient(ellipse at center, rgba(255,255,255,.75) 15%, #3b82f6 50%);
  clip-path:polygon(50% 25%,65% 30%,75% 42%,75% 58%,65% 70%,50% 75%,35% 70%,26% 58%,25% 42%,35% 30%);
  animation:animation-ball 15s both ease;
  pointer-events:none;
}
@keyframes animation-ball{
  2%{clip-path:polygon(50% 25%,50% 0,75% 42%,75% 58%,65% 70%,50% 75%,35% 70%,26% 58%,25% 42%,50% 0)}
  4%{clip-path:polygon(50% 25%,70% 0,75% 42%,85% 66%,65% 100%,50% 75%,35% 100%,15% 65%,25% 42%,30% 0)}
  6%{clip-path:polygon(50% 25%,50% 15%,75% 42%,75% 58%,65% 70%,50% 75%,35% 70%,26% 58%,25% 42%,50% 15%)}
  7%,59%{clip-path:polygon(50% 25%,100% 12%,75% 42%,85% 66%,65% 70%,50% 75%,35% 70%,15% 65%,25% 42%,0 12%)}
  9%,57%{clip-path:polygon(50% 25%,50% 0,75% 42%,75% 58%,65% 70%,50% 75%,35% 70%,26% 58%,25% 42%,50% 0)}
  12%,55%,61%{clip-path:polygon(50% 25%,65% 30%,75% 42%,75% 58%,65% 70%,50% 75%,35% 70%,26% 58%,25% 42%,35% 30%)}
}

/* Rings 3D */
.orb-rings{
  aspect-ratio:1;border-radius:50%;
  position:absolute;inset:0;perspective:11rem;
}
.orb-rings::before,.orb-rings::after{
  content:'';position:absolute;inset:0;
  border-radius:50%;border:6px solid transparent;
  mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  background:linear-gradient(white,blue,magenta,violet,lightyellow) border-box;
  mask-composite:exclude;
}
.orb-rings::before{animation:ring180 10s linear infinite}
.orb-rings::after{animation:ring90 10s linear infinite}
@keyframes ring180{
  0%{transform:rotateY(180deg) rotateX(180deg) rotateZ(180deg)}
  50%{transform:rotateY(360deg) rotateX(360deg) rotateZ(360deg) scale(1.1)}
  100%{transform:rotateY(540deg) rotateX(540deg) rotateZ(540deg)}
}
@keyframes ring90{
  0%{transform:rotateY(90deg) rotateX(90deg) rotateZ(90deg)}
  50%{transform:rotateY(270deg) rotateX(270deg) rotateZ(270deg) scale(1.1)}
  100%{transform:rotateY(450deg) rotateX(450deg) rotateZ(450deg)}
}

.orb-hint{
  font-size:.72rem;
  /* Gradient rouge→bleu comme le badge UIVerse */
  background-image:linear-gradient(to right,#ff0002,#9147ff,#3b82f6);
  background-clip:text;-webkit-background-clip:text;color:transparent;
  letter-spacing:.08em;text-transform:uppercase;text-align:center;
  opacity:.7;
}

/* Live text bubble — style UIVerse : fond semi-transparent + box-shadow coloré */
.voice-live-text{
  min-height:52px;max-width:460px;width:100%;
  background:linear-gradient(135deg,rgba(255,0,2,.08),rgba(59,130,246,.08));
  border:1px solid rgba(145,71,255,.2);
  border-radius:18px;padding:14px 20px;
  font-size:.875rem;color:rgba(255,255,255,.88);line-height:1.65;text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:6px 6px 12px rgba(255,0,2,.08),-6px 6px 12px rgba(59,130,246,.08);
  transition:all .4s ease;
}
.voice-live-text.empty{color:rgba(255,255,255,.28);font-style:italic}

/* Boutons d'action à droite */
.voice-actions{
  position:absolute;right:24px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.voice-action-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;border:none;background:none;
  color:rgba(255,255,255,.4);font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;
  transition:color .2s,transform .15s;
}
.voice-action-btn:hover{color:rgba(255,255,255,.9);transform:scale(1.1)}
.voice-action-btn .vbtn-icon{
  width:46px;height:46px;border-radius:50%;
  /* Fond avec teinte violette de l'orbe */
  background:rgba(145,71,255,.1);
  border:1px solid rgba(145,71,255,.22);
  display:flex;align-items:center;justify-content:center;font-size:1.15rem;
  transition:all .2s;
}
.voice-action-btn:hover .vbtn-icon{
  background:rgba(145,71,255,.22);
  border-color:rgba(145,71,255,.5);
  box-shadow:0 0 12px rgba(145,71,255,.3);
}
/* Bouton danger = rouge de l'orbe */
.voice-action-btn.danger .vbtn-icon{
  background:rgba(255,0,2,.12);
  border-color:rgba(255,0,2,.25);
}
.voice-action-btn.danger:hover .vbtn-icon{
  background:rgba(255,0,2,.28);
  border-color:rgba(255,0,2,.55);
  box-shadow:0 0 12px rgba(255,0,2,.3);
}

/* Avatar emoji mode */
.voice-caller-avatar{transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.voice-caller-avatar.has-emoji{
  background:linear-gradient(135deg,rgba(255,0,2,.4),rgba(145,71,255,.5),rgba(59,130,246,.4));
  font-size:2.8rem;
  border-color:rgba(145,71,255,.4);
  box-shadow:
    0 0 0 6px rgba(145,71,255,.18),
    0 0 0 12px rgba(255,0,2,.08),
    0 12px 40px rgba(0,0,0,.5);
}

/* Research */
.research-step{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:8px;font-size:.875rem;transition:all .3s}
.research-step.done{background:var(--accent);border-color:rgba(100,150,120,.3)}
.research-step.done .spinner{color:var(--primary)}
.research-step.current{border-color:var(--primary);background:rgba(100,150,120,.05)}
.research-step.current .spinner{animation:spin 1s linear infinite;color:var(--primary)}

/* ── Canvas Suite ── */
.canvas-layout{display:flex;flex:1;overflow:hidden}

/* Sidebar docs */
.canvas-sidebar{

/* Action buttons in sidebar — grouped style */
.canvas-action-group{display:flex;flex-direction:column;gap:2px}
.canvas-action-btn{

}
.canvas-action-btn:hover{background:var(--accent)}
.canvas-action-btn .cab-icon{width:22px;text-align:center;font-size:.95rem;flex-shrink:0}

/* Main editor area */
.canvas-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-toolbar{

}

/* ── Web Search TAG ── */
.wsearch-wrap{display:flex;flex-direction:column;gap:14px;max-width:95%}

.wsearch-divider{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px;margin:4px 0}
.wsearch-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.wsearch-ai-box{border:1px solid rgba(79,158,111,.3);border-radius:12px;background:rgba(79,158,111,.04);padding:14px 16px}
.wsearch-ai-header{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:700;color:#4f9e6f;margin-bottom:10px}
.wsearch-ai-section{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 5px}
.wsearch-keywords{display:flex;flex-wrap:wrap;gap:6px}
.wsearch-kw{padding:3px 11px;border-radius:20px;font-size:.74rem;font-weight:600;background:var(--accent);color:var(--accent-fg);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.wsearch-kw:hover{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.wsearch-followups{display:flex;flex-direction:column;gap:5px}
.wsearch-fq{padding:6px 12px;border-radius:8px;font-size:.8rem;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;text-align:left;transition:all .15s;width:100%}

.wsearch-thinking{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);padding:4px 0}
.wsearch-thinking .spinner{animation:spin 1s linear infinite;font-size:1rem}

.canvas-editor-wrap{flex:1;display:flex;overflow:hidden;min-height:0}

// ─── Persistence ───
function saveState() {

}

function loadState() {
  try {
    const raw = localStorage.getItem('nord-ai-state');

    const saved = JSON.parse(raw);
    if (saved.conversations) state.conversations = saved.conversations;
    if (saved.activeId !== undefined) state.activeId = saved.activeId;
    if (saved.mode) state.mode = saved.mode;

    if (state.activeId && !state.conversations.find(c => c.id === state.activeId)) {

// ─── Gemini API ───
async function callGemini(messages, systemPrompt) {
  const { key, model } = state.settings;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

  const contents = [];
  for (const m of messages) {
    const role = m.role === 'user' ? 'user' : 'model';
    if (contents.length > 0 && contents[contents.length-1].role === role) {
      // Merge consecutive same-role messages
      contents[contents.length-1].parts.push({ text: m.content });
    } else {
      contents.push({ role, parts: [{ text: m.content }] });
    }
  }

  const isGemma = model.startsWith('gemma');
  const body = {
    contents,
    generationConfig: {
      temperature: (state.settings.temp || 70) / 100,
      maxOutputTokens: 2048,
      candidateCount: 1,
    }
  };
  if (systemPrompt) {
    if (isGemma) {
      // Gemma ne supporte pas system_instruction : on injecte dans le premier message utilisateur
      if (contents.length > 0 && contents[0].role === 'user') {
        contents[0].parts.unshift({ text: systemPrompt + '\n\n' });
      } else {
        contents.unshift({ role: 'user', parts: [{ text: systemPrompt }] });
      }
    } else {
      body.system_instruction = { parts: [{ text: systemPrompt }] };
    }
  }

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erreur API ${resp.status}`);
  }

  const data = await resp.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "Pas de réponse.";
}

async function callGeminiStream(messages, onChunk, onDone, systemPrompt) {
  const { key, model } = state.settings;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${key}`;

  const contents = [];
  for (const m of messages) {
    const role = m.role === 'user' ? 'user' : 'model';
    if (contents.length > 0 && contents[contents.length-1].role === role) {
      contents[contents.length-1].parts.push({ text: m.content });
    } else {
      contents.push({ role, parts: [{ text: m.content }] });
    }
  }

  const isGemmaStream = model.startsWith('gemma');
  const body = {
    contents,
    generationConfig: {
      temperature: (state.settings.temp || 70) / 100,
      maxOutputTokens: 2048,
      candidateCount: 1,
    }
  };
  if (systemPrompt) {
    if (isGemmaStream) {
      if (contents.length > 0 && contents[0].role === 'user') {
        contents[0].parts.unshift({ text: systemPrompt + '\n\n' });
      } else {
        contents.unshift({ role: 'user', parts: [{ text: systemPrompt }] });
      }
    } else {
      body.system_instruction = { parts: [{ text: systemPrompt }] };
    }
  }

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erreur API ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    let nl;
    while ((nl = buffer.indexOf('\n')) !== -1) {
      let line = buffer.slice(0, nl).trim();
      buffer = buffer.slice(nl + 1);
      if (!line.startsWith('data: ')) continue;
      const json = line.slice(6).trim();
      if (json === '[DONE]') { onDone(); return; }
      try {
        const parsed = JSON.parse(json);
        const text = parsed.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

// ── HTML escape ──
function hesc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── YouTube ID ──
function ytId(url) {
  var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}

// ── Syntax highlighter ──
function synHi(code, lang) {
  var c = hesc(code);
  if (lang === 'html' || lang === 'xml') {
    c = c.replace(/(<!--[\s\S]*?-->)/g, '<span class="tok-c">$1</span>');
    c = c.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="tok-t">$2</span>');
    c = c.replace(/([\w-]+)(=)(&quot;[^&]*?&quot;)/g, '<span class="tok-a">$1</span>=$3');
  } else if (lang === 'css') {
    c = c.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="tok-c">$1</span>');
    c = c.replace(/([\w-]+)\s*:/g, '<span class="tok-a">$1</span>:');
  } else {
    c = c.replace(/(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g, '<span class="tok-c">$1</span>');
    c = c.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="tok-s">$1</span>');
    c = c.replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|default|new|async|await|try|catch|def|print|None|True|False|self|null|undefined|true|false)\b/g, '<span class="tok-k">$1</span>');
    c = c.replace(/\b(\d+\.?\d*)\b/g, '<span class="tok-n">$1</span>');
  }
  return c;
}

// ── Inline markdown + URL/YouTube ──
function inlRender(raw) {
  // Pre-scan for YouTube URLs on the raw text (before hesc corrupts & → &amp;)
  var ytEmbeds = {};
  raw = raw.replace(/(https?:\/\/[^\s<>"]+)/g, function(url) {
    var vid = ytId(url);
    if (vid) {
      var placeholder = '\x00YT:' + vid + '\x00';
      ytEmbeds[placeholder] = vid;
      return placeholder;
    }
    return url;
  });

  var s = hesc(raw);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_\n]+?)_/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Replace regular URLs (not YouTube placeholders)
  s = s.replace(/(https?:\/\/[^\s<>"&]+(?:&amp;[\w=&]*)?)(?!\x00)/g, function(url) {
    // Already-escaped URL — render as link
    var rawUrl = url.replace(/&amp;/g, '&');
    return '<a href="' + hesc(rawUrl) + '" class="rl" target="_blank" rel="noopener">' + url + '</a>';
  });

  // Restore YouTube embeds (using escaped placeholder)
  Object.keys(ytEmbeds).forEach(function(ph) {
    var vid = ytEmbeds[ph];
    var escapedPh = ph.replace(/\x00/g, '&#0;');
    // The placeholder went through hesc, so \x00 → &#0; — handle both
    s = s.split(hesc(ph)).join('</p><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen loading="lazy"></iframe></div><p>');
    s = s.split(ph).join('</p><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen loading="lazy"></iframe></div><p>');
  });

  return s;
}

// ── Table renderer ──
function renderTbl(lines) {
  var rows = lines.filter(function(l){ return !/^\s*[|:\-\s]+\s*$/.test(l); });
  if (!rows.length) return '';
  var html = '<table>';
  rows.forEach(function(row, i) {
    var cells = row.split('|').map(function(x){return x.trim();}).filter(function(x){return x;});
    var tag = i === 0 ? 'th' : 'td';
    html += '<tr>' + cells.map(function(x){ return '<' + tag + '>' + inlRender(x) + '</' + tag + '>'; }).join('') + '</tr>';
  });
  return html + '</table>';
}

// ── Text block renderer ──
function txtRender(text) {
  if (!text.trim()) return '';
  var lines = text.split('\n');
  var html = '';
  var listType = null;
  var tblLines = [];

  var flushList = function() { if (listType) { html += '</' + listType + '>'; listType = null; } };
  var flushTbl = function() { if (tblLines.length) { html += renderTbl(tblLines); tblLines = []; } };

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.includes('|') && line.trim().startsWith('|')) {
      flushList(); tblLines.push(line); continue;
    } else { flushTbl(); }
    if (/^[-*_]{3,}$/.test(line.trim())) { flushList(); html += '<hr>'; continue; }
    var hm = line.match(/^(#{1,3})\s+(.+)/);
    if (hm) { flushList(); html += '<h' + hm[1].length + '>' + inlRender(hm[2]) + '</h' + hm[1].length + '>'; continue; }
    if (line.startsWith('> ')) { flushList(); html += '<blockquote>' + inlRender(line.slice(2)) + '</blockquote>'; continue; }
    var ulm = line.match(/^[-*+]\s+(.+)/);
    if (ulm) { if (listType !== 'ul') { flushList(); html += '<ul>'; listType = 'ul'; } html += '<li>' + inlRender(ulm[1]) + '</li>'; continue; }
    var olm = line.match(/^\d+\.\s+(.+)/);
    if (olm) { if (listType !== 'ol') { flushList(); html += '<ol>'; listType = 'ol'; } html += '<li>' + inlRender(olm[1]) + '</li>'; continue; }
    flushList();
    if (line.trim() === '') continue;
    html += '<p>' + inlRender(line) + '</p>';
  }
  flushList(); flushTbl();
  return html;
}

// ── Rich renderer (code blocks + text) ──
function richRender(raw) {
  if (!raw) return '';
  var segs = [];
  var re = /```(\w*)\n?([\s\S]*?)```/g;
  var last = 0;
  var m;
  while ((m = re.exec(raw)) !== null) {
    if (m.index > last) segs.push({t:'txt', v: raw.slice(last, m.index)});
    segs.push({t:'code', lang:(m[1]||'text').toLowerCase(), v: m[2].replace(/\n$/, '')});
    last = m.index + m[0].length;
  }
  if (last < raw.length) segs.push({t:'txt', v: raw.slice(last)});

  var html = '';
  segs.forEach(function(seg) {
    if (seg.t === 'code') {
      var cbId = 'cb' + Math.random().toString(36).slice(2,8);
      var isHtml = seg.lang === 'html';
      var hi = synHi(seg.v, seg.lang);
      var prevBtn = isHtml
        ? '<button class="code-preview-btn" onclick="togglePrev(\'' + cbId + '\')">👁 Aperçu</button>'
        : '';
      html += '<div class="code-block" id="' + cbId + '">'
            + '<div class="code-block-header">'
            + '<span class="code-lang">' + hesc(seg.lang || 'code') + '</span>'
            + '<div class="code-block-actions">'
            + prevBtn
            + '<button class="code-copy-btn" onclick="cpCode(\'' + cbId + '\')">📋 Copier</button>'
            + '</div></div>'
            + '<pre><code>' + hi + '</code></pre></div>';
      if (isHtml) {
        html += '<div class="html-preview-wrap" id="' + cbId + '_pv" style="display:none">'
              + '<div class="html-preview-bar"><div class="pbar-dots">'
              + '<div class="pbar-dot" style="background:#ff5f57"></div>'
              + '<div class="pbar-dot" style="background:#febc2e"></div>'
              + '<div class="pbar-dot" style="background:#28c840"></div>'
              + '</div><span>Aperçu HTML</span></div>'
              + '<iframe id="' + cbId + '_fr" sandbox="allow-scripts allow-same-origin" style="min-height:200px"></iframe></div>';
      }
    } else {
      html += txtRender(seg.v);
    }
  });
  return html;
}

// ── HTML Preview toggle ──
function togglePrev(id) {
  var wrap = document.getElementById(id + '_pv');
  var frame = document.getElementById(id + '_fr');
  if (!wrap || !frame) return;
  var show = wrap.style.display === 'none';
  wrap.style.display = show ? 'block' : 'none';
  if (show) {
    var code = document.getElementById(id) && document.getElementById(id).querySelector('pre code');
    if (code) {
      var blob = new Blob([code.innerText || code.textContent], {type:'text/html'});
      frame.src = URL.createObjectURL(blob);
      frame.onload = function() {
        try { var h = frame.contentDocument.body.scrollHeight; frame.style.height = Math.max(180, Math.min(h+20,600)) + 'px'; } catch(e){}
      };
    }
  }
}

// ── Copy code ──
function cpCode(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var code = el.querySelector('pre code');
  if (code) navigator.clipboard.writeText(code.innerText || code.textContent);
}

// ── QCM parser ──
function parseQcm(text) {
  var blocks = [];
  var parts = text.split(/\n(?=QUESTION:|Q\d+[:.])/);
  parts.forEach(function(part) {
    var lines = part.trim().split('\n');
    if (!lines.length) return;
    var q = lines[0].replace(/^(QUESTION:|Q\d+[:.]\s*)/i,'').trim();
    var opts = [];
    var correct = null;
    var expl = '';
    for (var i = 1; i < lines.length; i++) {
      var l = lines[i].trim();
      var cm = l.match(/^CORRECT:\s*([A-D])/i);
      var em = l.match(/^EXPLICATION:\s*(.+)/i);
      var om = l.match(/^([A-D])[).]\s+(.+)/);
      if (cm) { correct = cm[1].toUpperCase(); }
      else if (em) { expl = em[1]; }
      else if (om) {
        var isC = /\(correct\)/i.test(om[2]);
        opts.push({letter: om[1].toUpperCase(), text: om[2].replace(/\(correct\)/i,'').trim()});
        if (isC) correct = om[1].toUpperCase();
      }
    }
    if (q && opts.length >= 2) blocks.push({q:q, opts:opts, correct:correct, expl:expl});
  });
  return blocks;
}

// ── QCM renderer ──
function renderQcm(blocks, msgId) {
  var html = '<div class="qcm-wrap">';
  blocks.forEach(function(b, qi) {
    var qid = 'qcm_' + msgId + '_' + qi;
    html += '<div class="qcm-card">'
          + '<div class="qcm-q">' + hesc(b.q) + '</div>'
          + '<div class="qcm-opts" id="' + qid + '_o">';
    b.opts.forEach(function(o) {
      html += '<button class="qcm-opt" data-qid="' + qid + '" data-letter="' + o.letter + '" data-correct="' + (b.correct||'') + '" data-msgid="' + msgId + '" onclick="ansQcm(this)">'
            + hesc(o.letter + ') ' + o.text)
            + '</button>';
    });
    html += '</div>';
    if (b.expl) html += '<div class="qcm-expl" id="' + qid + '_e">' + hesc(b.expl) + '</div>';
    html += '</div>';
  });
  html += '<div class="qcm-score-bar" id="qscore_' + msgId + '"></div>';
  html += '</div>';
  return html;
}

// ── QCM answer handler ──
function ansQcm(btn) {
  var qid = btn.dataset.qid;
  var correct = btn.dataset.correct;
  var msgId = btn.dataset.msgid;
  var container = document.getElementById(qid + '_o');
  if (!container || container.dataset.answered) return;
  container.dataset.answered = '1';
  container.querySelectorAll('.qcm-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.letter === correct) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  var expl = document.getElementById(qid + '_e');
  if (expl) expl.style.display = 'block';
  // Score
  var bubble = btn.closest('.bubble');
  if (!bubble) return;
  var allOpts = bubble.querySelectorAll('.qcm-opts');
  var answered = bubble.querySelectorAll('.qcm-opts[data-answered]');
  var correct_count = bubble.querySelectorAll('.qcm-opt.correct[disabled]').length;
  var wrong_count = bubble.querySelectorAll('.qcm-opt.wrong[disabled]').length;
  if (answered.length === allOpts.length) {
    var scoreEl = document.getElementById('qscore_' + msgId);
    if (scoreEl) {
      var pct = Math.round(correct_count / allOpts.length * 100);
      scoreEl.textContent = '🎯 Score final : ' + correct_count + '/' + allOpts.length + ' (' + pct + '%)';
      scoreEl.style.display = 'block';
    }
  }
}

// ── YouTube TAG renderer ──
function renderYtResults(raw, msgId) {
  // Parse lines starting with "YT:" or containing youtube URLs
  var lines = raw.split('\n');
  var cards = [];
  var textLines = [];

  lines.forEach(function(line) {
    var ytLine = line.match(/^YT:\s*(https?:\/\/[^\s—–-]+)/i);
    var urlInline = !ytLine && line.match(/(https?:\/\/(?:youtu\.be\/|(?:www\.)?youtube\.com\/watch\?v=)[\w-]{11}[^\s]*)/);

    if (ytLine || urlInline) {
      var url = ytLine ? ytLine[1].trim() : urlInline[1].trim();
      var vid = ytId(url);
      if (vid) {
        // Parse metadata after the URL
        var rest = line.replace(/^YT:\s*/i,'').replace(url,'').replace(/^[\s—–-]+/,'').trim();
        var parts = rest.split(/\s*[—–]\s*/);
        var title = parts[0] || 'Vidéo YouTube';
        var channel = parts[1] || '';
        var duration = parts[2] || '';
        var desc = parts[3] || '';
        cards.push({vid:vid, url:url, title:title, channel:channel, duration:duration, desc:desc});
      } else {
        textLines.push(line);
      }
    } else {
      textLines.push(line);
    }
  });

  var html = '';
  // Render any intro text
  var introText = textLines.join('\n').trim();
  if (introText) html += richRender(introText);

  if (cards.length === 0) return html + richRender(raw);

  html += '<div style="display:flex;flex-direction:column;gap:16px;margin-top:10px">';
  cards.forEach(function(card) {
    html += '<div style="border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card)">'
          + '<div style="position:relative;padding-bottom:56.25%;height:0;background:#000">'
          + '<iframe src="https://www.youtube.com/embed/' + card.vid + '" allowfullscreen loading="lazy" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none"></iframe>'
          + '</div>'
          + '<div style="padding:10px 14px">'
          + '<div style="font-weight:600;font-size:.9em;margin-bottom:4px">' + hesc(card.title) + '</div>'
          + (card.channel ? '<div style="font-size:.78em;color:var(--muted)">' + hesc(card.channel) + (card.duration ? ' · ' + hesc(card.duration) : '') + '</div>' : '')
          + (card.desc ? '<div style="font-size:.8em;color:var(--muted);margin-top:4px">' + hesc(card.desc) + '</div>' : '')
          + '<a href="https://www.youtube.com/watch?v=' + card.vid + '" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:.75em;color:var(--primary);text-decoration:none;border-bottom:1px dotted">▶ Ouvrir sur YouTube</a>'
          + '</div></div>';
  });
  html += '</div>';
  return html;
}

// ── Google Search Grounding via Gemini ──
async function callGeminiSearch(query, onStatus) {
  var key = state.settings.key;
  // Use gemini-2.0-flash or 2.5-flash for search grounding
  var model = state.settings.model;
  if (model.startsWith('gemma')) model = 'gemini-2.0-flash';

  var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key;

  onStatus('🔍 Interrogation de Google Search…');

  var body = {
    contents: [{ role: 'user', parts: [{ text:
      'Recherche web sur : ' + query + '\n\n' +
      'Réponds en JSON strictement (pas de markdown). Format :\n' +
      '{\n' +
      '  "results": [\n' +
      '    {"title":"...","url":"...","snippet":"...","domain":"..."}\n' +
      '  ],\n' +
      '  "keywords": ["mot1","mot2","mot3","mot4","mot5"],\n' +
      '  "synthesis": "Paragraphe de synthèse des résultats en 3-4 phrases.",\n' +
      '  "followups": ["Question de suivi 1?","Question de suivi 2?","Question de suivi 3?"]\n' +
      '}\n\n' +
      'Fournis 6 à 8 résultats réels, pertinents et variés. Les URLs doivent être réels.'
    }] }],
    tools: [{ google_search: {} }],
    generationConfig: { temperature: 0.1, maxOutputTokens: 3000 }
  };

  var resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    // Fallback: si grounding non supporté par ce modèle, on tente sans tool
    if (err.error && (err.error.message||'').includes('not supported')) {
      return callGeminiSearchFallback(query, onStatus);
    }
    throw new Error(err.error && err.error.message ? err.error.message : 'Erreur API ' + resp.status);
  }

  var data = await resp.json();
  var rawText = '';
  if (data.candidates && data.candidates[0]) {
    var parts = data.candidates[0].content && data.candidates[0].content.parts;
    if (parts) parts.forEach(function(p){ if (p.text) rawText += p.text; });
  }

  // Extract grounding metadata (real URLs from Google)
  var groundingChunks = [];
  try {
    var gm = data.candidates[0].groundingMetadata;
    if (gm && gm.groundingChunks) groundingChunks = gm.groundingChunks;
  } catch(e) {}

  // Parse JSON from response
  var parsed = null;
  try {
    var clean = rawText.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
    parsed = JSON.parse(clean);
  } catch(e) {
    // Build from grounding chunks if JSON parse fails
    parsed = { results: [], keywords: [], synthesis: rawText.slice(0,400), followups: [] };
  }

  // Merge grounding chunks into results (they have real URLs)
  if (groundingChunks.length > 0) {
    var chunkResults = groundingChunks.map(function(chunk, i) {
      var web = chunk.web || {};
      return {
        title: web.title || ('Résultat ' + (i+1)),
        url: web.uri || '',
        snippet: '',
        domain: web.uri ? web.uri.replace(/https?:\/\/(www\.)?/,'').split('/')[0] : ''
      };
    });
    // Merge: use parsed results for snippets, chunk results for real URLs
    if (parsed.results && parsed.results.length > 0) {
      parsed.results = parsed.results.map(function(r, i) {
        if (chunkResults[i]) {
          return { title: chunkResults[i].title || r.title, url: chunkResults[i].url || r.url, snippet: r.snippet, domain: chunkResults[i].domain || r.domain };
        }
        return r;
      });
      // Add any extra chunk results not in parsed
      for (var i = parsed.results.length; i < chunkResults.length; i++) {
        parsed.results.push(chunkResults[i]);
      }
    } else {
      parsed.results = chunkResults;
    }
  }

  onStatus('✦ Analyse IA des résultats…');

  // Phase 2: AI analyzes the results
  var analysisPrompt = 'Voici les résultats de recherche Google pour : "' + query + '"\n\n';
  if (parsed.results) {
    parsed.results.forEach(function(r, i) {
      analysisPrompt += (i+1) + '. ' + (r.title||'') + '\n   ' + (r.url||'') + '\n   ' + (r.snippet||'') + '\n\n';
    });
  }
  analysisPrompt += '\nRéponds en JSON strictement :\n{"keywords":["kw1","kw2","kw3","kw4","kw5","kw6"],"synthesis":"synthèse en 3-4 phrases","followups":["Question 1?","Question 2?","Question 3?"],"topIndices":[0,1,2],"aiComment":"Commentaire IA sur la qualité et la pertinence des résultats, ce qu\'on retient."}';

  var analysis = await callGemini([{ role:'user', content: analysisPrompt }],
    'Tu es un assistant de recherche expert. Analyse les résultats de recherche web et fournis des insights. Réponds UNIQUEMENT en JSON valide, sans markdown.');

  try {
    var clean2 = analysis.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
    var aData = JSON.parse(clean2);
    if (aData.keywords) parsed.keywords = aData.keywords;
    if (aData.synthesis) parsed.synthesis = aData.synthesis;
    if (aData.followups) parsed.followups = aData.followups;
    if (aData.topIndices) parsed.topIndices = aData.topIndices;
    if (aData.aiComment) parsed.aiComment = aData.aiComment;
  } catch(e) {}

  return parsed;
}

// Fallback sans grounding (pour modèles qui ne le supportent pas)
async function callGeminiSearchFallback(query, onStatus) {
  onStatus('🔍 Recherche (mode fallback)…');
  var prompt = 'Simule une recherche Google pour : "' + query + '"\n\nRéponds UNIQUEMENT en JSON (pas de markdown) :\n{"results":[{"title":"...","url":"https://...","snippet":"...","domain":"..."}],"keywords":["kw1","kw2","kw3","kw4","kw5"],"synthesis":"...","followups":["...","...","..."],"aiComment":"...","topIndices":[0,1,2]}';
  var text = await callGemini([{role:'user',content:prompt}],
    'Tu es un moteur de recherche simulé. Fournis des résultats web plausibles et réels. Réponds UNIQUEMENT en JSON valide.');
  try {
    var clean = text.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    return { results:[{title:'Résultat de recherche',url:'',snippet:text.slice(0,200),domain:''}], keywords:[], synthesis:text.slice(0,300), followups:[] };
  }
}

// ── Render web search results bubble ──
function renderWebSearch(data, query, msgId) {
  if (!data) return '<p>Aucun résultat.</p>';
  var results = data.results || [];
  var keywords = data.keywords || [];
  var synthesis = data.synthesis || '';
  var followups = data.followups || [];
  var topIndices = data.topIndices || [0,1,2];
  var aiComment = data.aiComment || '';

  var html = '<div class="wsearch-wrap">';

  // Header
  html += '<div class="wsearch-header">'
        + '<span style="font-size:1.1rem">🔍</span>'
        + '<span class="wsearch-query">' + hesc(query) + '</span>'
        + '<span class="wsearch-count">' + results.length + ' résultats</span>'
        + '</div>';

  // Results list
  if (results.length > 0) {
    html += '<div class="wsearch-results">';
    results.forEach(function(r, i) {
      var isTop = topIndices.indexOf(i) !== -1;
      var domain = r.domain || (r.url ? r.url.replace(/https?:\/\/(www\.)?/,'').split('/')[0] : '');
      var faviconUrl = domain ? 'https://www.google.com/s2/favicons?sz=32&domain=' + domain : '';
      html += '<div class="wsearch-card">'
            + '<div class="wsearch-card-top">'
            + (faviconUrl ? '<img class="wsearch-card-favicon" src="' + hesc(faviconUrl) + '" onerror="this.style.display=\'none\'">' : '<span style="width:16px;flex-shrink:0"></span>')
            + '<span class="wsearch-card-title">'
            + (r.url ? '<a href="' + hesc(r.url) + '" target="_blank" rel="noopener">' + hesc(r.title||r.url) + '</a>' : hesc(r.title||'Résultat'))
            + '</span>'
            + (isTop ? '<span class="wsearch-card-rank">★ Top</span>' : '')
            + '</div>'
            + (domain ? '<div class="wsearch-card-url">' + hesc(domain) + '</div>' : '')
            + (r.snippet ? '<div class="wsearch-card-snippet">' + hesc(r.snippet) + '</div>' : '')
            + '</div>';
    });
    html += '</div>';
  }

  // AI Analysis box
  html += '<div class="wsearch-divider">Analyse IA</div>';
  html += '<div class="wsearch-ai-box">';
  html += '<div class="wsearch-ai-header"><span>✦</span> Nørd AI — Analyse des résultats</div>';

  if (synthesis) {
    html += '<div style="font-size:.83rem;line-height:1.65;margin-bottom:8px">' + hesc(synthesis) + '</div>';
  }
  if (aiComment) {
    html += '<div style="font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:10px;border-left:2px solid var(--primary);padding-left:8px">' + hesc(aiComment) + '</div>';
  }

  if (keywords.length > 0) {
    html += '<div class="wsearch-ai-section">Mots-clés identifiés</div>';
    html += '<div class="wsearch-keywords">';
    keywords.forEach(function(kw) {
      html += '<button class="wsearch-kw" onclick="insertSearchKw(\'' + hesc(kw).replace(/'/g,"\\'") + '\')" title="Rechercher ce mot-clé">' + hesc(kw) + '</button>';
    });
    html += '</div>';
  }

  if (followups.length > 0) {
    html += '<div class="wsearch-ai-section">Questions de suivi suggérées</div>';
    html += '<div class="wsearch-followups">';
    followups.forEach(function(fq) {
      html += '<button class="wsearch-fq" onclick="insertSearchFq(\'' + hesc(fq).replace(/'/g,"\\'") + '\')">'
            + '<span style="color:var(--primary);margin-right:6px">→</span>' + hesc(fq)
            + '</button>';
    });
    html += '</div>';
  }

  html += '</div></div>';
  return html;
}

// ── renderBubble ──
function renderBubble(m) {
  var isUser = m.role === 'user';
  var rowClass = m.role === 'user' ? 'user' : m.role === 'ai-2' ? 'ai-2' : 'ai';
  var label = m.role==='ai-1' ? '<div class="msg-label">IA 1</div>' : m.role==='ai-2' ? '<div class="msg-label">IA 2</div>' : '';

  var body;
  if (m.isTyping) {
    body = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else if (isUser) {
    var s = hesc(m.content);
    s = s.replace(/(https?:\/\/[^\s<>"]+)/g, function(u){ return '<a href="'+u+'" class="rl" target="_blank" rel="noopener">'+u+'</a>'; });
    var imgTag = m.imageData ? '<img class="msg-img" src="' + m.imageData + '" alt="image">' : '';
    body = '<p>' + s + '</p>' + imgTag;
  } else {
    var raw = m.content || '';
    // QCM render if tag was QCM and format matches
    if (m._tag === '[QCM]' && raw.indexOf('QUESTION:') !== -1) {
      var blocks = parseQcm(raw);
      if (blocks.length > 0) {
        body = renderQcm(blocks, m.id);
        var actions = '<div class="msg-actions"><button onclick="copyMsg(\'' + m.id + '\')" title="Copier">📋</button><button onclick="speakBubble(\'' + m.id + '\')" title="Lire">🔊</button></div>';
        return '<div class="msg-row ' + rowClass + '"><div class="msg-avatar">✦</div><div style="min-width:0;flex:1">' + label + '<div class="bubble" id="bubble-' + m.id + '" style="max-width:90%">' + body + '</div>' + actions + '</div></div>';
      }
    }
    // RECHERCHE WEB render
    if (m._tag === '[RECHERCHE WEB]') {
      if (m.isTyping || !m._searchData) {
        body = '<div class="wsearch-thinking"><span class="spinner" style="animation:spin 1s linear infinite">⟳</span>' + hesc(m.content||'Recherche en cours…') + '</div>';
      } else {
        body = renderWebSearch(m._searchData, m._searchQuery || '', m.id);
      }
      var wsActions = !m.isTyping ? '<div class="msg-actions"><button onclick="copyMsg(\'' + m.id + '\')" title="Copier">📋</button></div>' : '';
      return '<div class="msg-row ' + rowClass + '"><div class="msg-avatar">✦</div><div style="min-width:0;flex:1">' + label + '<div class="bubble" id="bubble-' + m.id + '" style="max-width:98%;width:100%">' + body + '</div>' + wsActions + '</div></div>';
    }
    // YOUTUBE render
    if (m._tag === '[YOUTUBE]') {
      body = renderYtResults(raw, m.id);
      var ytActions = '<div class="msg-actions"><button onclick="copyMsg(\'' + m.id + '\')" title="Copier">📋</button></div>';
      return '<div class="msg-row ' + rowClass + '"><div class="msg-avatar">✦</div><div style="min-width:0;flex:1">' + label + '<div class="bubble" id="bubble-' + m.id + '" style="max-width:95%">' + body + '</div>' + ytActions + '</div></div>';
    }
    body = richRender(raw);
  }

  var actions = !isUser && !m.isTyping
    ? '<div class="msg-actions"><button onclick="copyMsg(\'' + m.id + '\')" title="Copier">📋</button><button onclick="speakBubble(\'' + m.id + '\')" title="Lire">🔊</button></div>'
    : '';

  return '<div class="msg-row ' + rowClass + '">'
       + '<div class="msg-avatar">' + (isUser ? '👤' : '✦') + '</div>'
       + '<div style="min-width:0;flex:1">'
       + label
       + '<div class="bubble" id="bubble-' + m.id + '">' + body + '</div>'
       + actions
       + '</div></div>';
}

function autoGrow(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

async function sendMessage() {
  if (!hasKey()) { openSettings(); return; }
  var input = document.getElementById('chat-input');
  var text = input ? input.value.trim() : '';
  if (!text && !_pendingImg) return;

  var convId = state.activeId;
  if (!convId) convId = createConversation();
  var conv = state.conversations.find(function(c){return c.id===convId;});
  if (!conv) return;

  input.value = '';
  input.style.height = 'auto';

  // Detect TAG
  var tag = detectTag(text);

  // User message
  var userMsg = {id:uid(), role:'user', content:text||'[Image envoyée]', timestamp:Date.now()};
  if (_pendingImg) { userMsg.imageData = _pendingImg.data; userMsg.imageType = _pendingImg.type; }
  clearImg();

  conv.messages.push(userMsg);
  if (conv.messages.length === 1) conv.title = (text||'Image').slice(0,40) + ((text.length||0)>40?'...':'');
  saveState();
  renderConvList();
  renderContent();

  // AI message placeholder
  var aiMsgId = uid();
  var aiMsg = {id:aiMsgId, role:'ai', content:'', timestamp:Date.now(), isTyping:true};
  if (tag) aiMsg._tag = tag;
  conv.messages.push(aiMsg);
  renderContent();

  // TAG [RECHERCHE WEB] → pipeline dédié
  if (tag === '[RECHERCHE WEB]') {
    var searchQuery = text.replace(/\[RECHERCHE WEB\]/gi,'').trim() || text;
    var wsAiMsgId = uid();
    var wsAiMsg = {id:wsAiMsgId, role:'ai', content:'', timestamp:Date.now(), isTyping:true, _tag:'[RECHERCHE WEB]', _searchQuery: searchQuery};
    conv.messages.push(wsAiMsg);
    renderContent();

    // Show progressive status in bubble
    var setWsStatus = function(status) {
      var foundMsg = conv.messages.find(function(m){return m.id===wsAiMsgId;});
      if (!foundMsg) return;
      foundMsg.content = status;
      var el = document.getElementById('bubble-' + wsAiMsgId);
      if (el) el.innerHTML = '<div class="wsearch-thinking"><span class="spinner">⟳</span>' + hesc(status) + '</div>';
    };

    try {
      var searchData = await callGeminiSearch(searchQuery, setWsStatus);
      var foundMsg = conv.messages.find(function(m){return m.id===wsAiMsgId;});
      if (foundMsg) {
        foundMsg.isTyping = false;
        foundMsg._searchData = searchData;
        foundMsg.content = '[Résultats de recherche pour : ' + searchQuery + ']';
      }
      saveState();
      renderContent();
    } catch(err) {
      var foundMsg2 = conv.messages.find(function(m){return m.id===wsAiMsgId;});
      if (foundMsg2) { foundMsg2.content = '⚠ Erreur recherche : ' + err.message; foundMsg2.isTyping = false; }
      saveState();
      renderContent();
    }
    return;
  }

  // System prompt: persona + TAG injection
  var systemPrompt = getPersonaPrompt(state.settings.persona);
  if (tag && TAG_PROMPTS[tag]) systemPrompt += '\n\n' + TAG_PROMPTS[tag];

  // Memory: compress old messages if conv > 20
  var realMsgs = conv.messages.filter(function(m){return (m.role==='user'||m.role==='ai')&&!m.isTyping&&m.id!==aiMsgId;});
  var apiMessages;
  if (realMsgs.length > 20) {
    var recent = realMsgs.slice(-10);
    var older = realMsgs.slice(0,-10);
    if (!conv._summary) {
      conv._summary = older.map(function(m){ return (m.role==='user'?'U':'A')+': '+m.content.slice(0,100); }).join(' | ');
    }
    apiMessages = [
      {role:'user', content:'[Contexte résumé des échanges précédents]: ' + conv._summary},
      {role:'model', content:'Compris, je tiens compte du contexte.'},
    ].concat(recent.map(function(m){ return {role:m.role==='user'?'user':'model', content:m.content}; }));
  } else {
    apiMessages = realMsgs.map(function(m){ return {role:m.role==='user'?'user':'model', content:m.content}; });
  }

  try {
    var foundMsg = conv.messages.find(function(m){return m.id===aiMsgId;});
    var fullText = '';
    var lastRender = 0;

    // Patch uniquement la bulle active sans re-render tout le DOM
    var patchBubble = function() {
      var el = document.getElementById('bubble-' + aiMsgId);
      if (el) {
        el.innerHTML = richRender(fullText);
        // Auto-scroll
        var scroll = document.getElementById('msg-scroll');
        if (scroll) scroll.scrollTop = scroll.scrollHeight;
      } else {
        // Fallback: premier chunk — bulle pas encore dans le DOM
        renderContent();
      }
    }

    await callGeminiStream(
      apiMessages,
      function(chunk) {
        fullText += chunk;
        foundMsg.content = fullText;
        foundMsg.isTyping = false;
        // Throttle: re-render max toutes les 80ms pour fluidité max
        var now = Date.now();
        if (now - lastRender > 80) {
          lastRender = now;
          patchBubble();
        }
      },
      function() {
        foundMsg.isTyping = false;
        if (!fullText) foundMsg.content = 'Pas de réponse.';
        saveState();
        renderContent(); // render complet final pour actions, QCM etc.
      },
      systemPrompt
    );
  } catch(err) {
    var foundMsg2 = conv.messages.find(function(m){return m.id===aiMsgId;});
    if (foundMsg2) { foundMsg2.content = '⚠ Erreur: ' + err.message; foundMsg2.isTyping = false; }
    saveState();
    renderContent();
  }
}

function copyMsg(id) {

let debateRunning = false;

function renderDebate(area) {
  const conv = getConv();
  const msgs = conv?.messages || [];

        ${msgs.map(m=>renderBubble(m)).join('')}

function openDebateConfig() { $('#debate-overlay').classList.remove('hidden'); }
function closeDebateConfig() { $('#debate-overlay').classList.add('hidden'); }

async function startDebate() {
  if (!hasKey()) { closeDebateConfig(); openSettings(); return; }
  closeDebateConfig();
  let convId = state.activeId;
  if(!convId) convId = createConversation();
  const conv = state.conversations.find(c=>c.id===convId);
  conv.messages = [];
  conv.title = 'Débat: ' + ($('#debate-topic')?.value||'').slice(0,35) + '...';
  debateRunning = true;

  const topic = $('#debate-topic')?.value || '';
  const p1 = $('#debate-p1')?.value || 'Optimiste';
  const p2 = $('#debate-p2')?.value || 'Sceptique';
  const maxTurns = 6;

  saveState();
  renderConvList();

  for (let turn=0; turn<maxTurns; turn++) {
    const isFirst = turn%2===0;
    const role = isFirst ? 'ai-1' : 'ai-2';
    const msgId = uid();
    const persona = isFirst ? p1 : p2;
    const otherPersona = isFirst ? p2 : p1;

    conv.messages.push({ id:msgId, role, content:'', timestamp:Date.now(), isTyping:true });
    renderContent();

    try {
      const history = conv.messages.filter(m=>!m.isTyping && m.content).map(m=>({
        role: m.role==='ai-1' ? 'user' : 'model',
        content: `[${m.role==='ai-1'?p1:p2}]: ${m.content}`
      }));

      const systemP = `Tu incarnes "${persona}" dans un débat contre "${otherPersona}" sur le sujet: "${topic}". 
Reste dans ton rôle, sois convaincu de ta position. Réponds en 2-3 phrases maximum. 
${turn===0 ? 'Présente ta position initiale.' : 'Réponds à l\'argument précédent et défends ta position.'}
Réponds en français.`;

      const prompt = turn === 0
        ? [{ role:'user', content: `Commence le débat sur: "${topic}". Présente ta position en tant que "${persona}".` }]
        : [...history, { role:'user', content:`Tour ${turn+1}: réponds à l'argument précédent.` }];

      let fullText = '';
      const aiMsg = conv.messages.find(m=>m.id===msgId);
      await callGeminiStream(
        prompt,
        (chunk) => { fullText += chunk; aiMsg.content = fullText; aiMsg.isTyping = false; renderContent(); },
        () => { aiMsg.isTyping = false; renderContent(); },
        systemP
      );
      saveState();
    } catch(err) {
      const m = conv.messages.find(x=>x.id===msgId);
      if (m) { m.content = '⚠ Erreur: '+err.message; m.isTyping = false; }
      renderContent();
      break;
    }
    await new Promise(r=>setTimeout(r,200));
  }
  debateRunning = false;
  saveState();
}

function execCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('canvas-editor')?.focus();
  saveCanvasContent();
}

function saveCanvasContent() {
  const doc = getActiveDoc();
  if (!doc) return;
  if (state.canvas.editorMode === 'md') {
    const src = document.getElementById('canvas-md-source');
    if (src) doc.mdContent = src.value;
  } else {
    doc.content = document.getElementById('canvas-editor')?.innerHTML || '';
  }
  updateWordCount();
  const ss = document.getElementById('canvas-save-status');
  if (ss) ss.textContent = 'Sauvegardé ✓';
  saveState();
}

function updateWordCount() {
  var text = '';
  if (state.canvas.editorMode === 'md') {
    var src = document.getElementById('canvas-md-source');
    text = src ? src.value : '';
  } else {
    var editor = document.getElementById('canvas-editor');
    text = editor ? (editor.innerText || '') : '';
  }
  var words = text.trim().split(/\s+/).filter(function(w){return w;}).length;
  var el = document.getElementById('canvas-wc');
  if (el) el.textContent = words + ' mot' + (words !== 1 ? 's' : '');
}

// ── Inject canvas editor zone (avoids nested template-literal bugs) ──
function injectCanvasEditorZone(doc) {
  var zone = document.getElementById('canvas-editor-zone');
  if (!zone) return;
  zone.innerHTML = '';

  var modeLbl = document.getElementById('canvas-mode-label');

  if (state.canvas.editorMode === 'md') {
    // ── Markdown mode ──
    if (modeLbl) modeLbl.textContent = '⌥ Mode Markdown';

    var mdWrap = document.createElement('div');
    mdWrap.id = 'canvas-md-wrap';
    mdWrap.className = 'canvas-md-wrap';

    // Source textarea
    var ta = document.createElement('textarea');
    ta.id = 'canvas-md-source';
    ta.className = 'canvas-md-source';

    mdWrap.appendChild(prev);

  } else {

    ed.addEventListener('input', saveCanvasContent);
    ed.addEventListener('keydown', canvasKeyDown);
    zone.appendChild(ed);
  }

  updateWordCount();
}
function htmlToMd(html) {
  if (!html) return '';
  var d = document.createElement('div');
  d.innerHTML = html;
  var md = '';
  function walk(node) {
    if (node.nodeType === 3) { md += node.textContent; return; }
    var tag = node.tagName ? node.tagName.toLowerCase() : '';
    if (tag === 'h1') { md += '\n# '; node.childNodes.forEach(walk); md += '\n\n'; return; }
    if (tag === 'h2') { md += '\n## '; node.childNodes.forEach(walk); md += '\n\n'; return; }
    if (tag === 'h3') { md += '\n### '; node.childNodes.forEach(walk); md += '\n\n'; return; }
    if (tag === 'strong' || tag === 'b') { md += '**'; node.childNodes.forEach(walk); md += '**'; return; }
    if (tag === 'em' || tag === 'i') { md += '*'; node.childNodes.forEach(walk); md += '*'; return; }
    if (tag === 'code') { md += '`'; node.childNodes.forEach(walk); md += '`'; return; }
    if (tag === 'pre') { md += '\n```\n' + (node.innerText||node.textContent) + '\n```\n\n'; return; }
    if (tag === 'blockquote') { md += '\n> '; node.childNodes.forEach(walk); md += '\n\n'; return; }
    if (tag === 'hr') { md += '\n---\n\n'; return; }
    if (tag === 'br') { md += '\n'; return; }
    if (tag === 'p') { node.childNodes.forEach(walk); md += '\n\n'; return; }
    if (tag === 'li') { md += '- '; node.childNodes.forEach(walk); md += '\n'; return; }
    if (tag === 'ul' || tag === 'ol') { md += '\n'; node.childNodes.forEach(walk); md += '\n'; return; }
    if (tag === 'a') { var href = node.getAttribute('href')||''; md += '['; node.childNodes.forEach(walk); md += '](' + href + ')'; return; }
    node.childNodes.forEach(walk);
  }
  d.childNodes.forEach(walk);
  return md.replace(/\n{3,}/g, '\n\n').trim();
}

// ── Tab key in markdown editor ──
function mdKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var ta = e.target;
    var s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onMdInput();
  }
}

// ── Toolbar: wrap selection ──
function mdInsert(before, after) {
  var ta = document.getElementById('canvas-md-source');
  if (!ta) return;
  var s = ta.selectionStart, e = ta.selectionEnd;
  var sel = ta.value.slice(s, e) || 'texte';
  ta.value = ta.value.slice(0, s) + before + sel + after + ta.value.slice(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = s + before.length + sel.length;
  ta.focus();
  onMdInput();
}

// ── Toolbar: insert at line start ──
function mdInsertLine(prefix) {
  var ta = document.getElementById('canvas-md-source');
  if (!ta) return;
  var s = ta.selectionStart;
  var lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value = ta.value.slice(0, lineStart) + prefix + ta.value.slice(lineStart);
  ta.selectionStart = ta.selectionEnd = s + prefix.length;
  ta.focus();
  onMdInput();
}

// ── Toolbar: insert block (e.g. code fence) ──
function mdInsertBlock(before, after) {
  var ta = document.getElementById('canvas-md-source');
  if (!ta) return;
  var s = ta.selectionStart, e = ta.selectionEnd;
  var sel = ta.value.slice(s, e) || '';
  var ins = '\n' + before + sel + after + '\n';
  ta.value = ta.value.slice(0, s) + ins + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + ins.length;
  ta.focus();
  onMdInput();
}

// ── Switch editor mode ──
function setCanvasMode(mode) {
  var doc = getActiveDoc();
  if (!doc) return;
  if (mode === state.canvas.editorMode) return;

  // 1. Save current content from live DOM before anything is destroyed
  if (state.canvas.editorMode === 'md') {
    var src = document.getElementById('canvas-md-source');
    if (src) doc.mdContent = src.value;
  } else {
    var ed = document.getElementById('canvas-editor');
    if (ed) doc.content = ed.innerHTML;
  }

  // 2. Convert content for the target mode
  if (mode === 'md') {
    // Only convert if no mdContent yet — preserve existing mdContent
    if (!doc.mdContent || doc.mdContent.trim() === '') {
      doc.mdContent = htmlToMd(doc.content || '');
    }
  } else {
    // Going back to wysiwyg: convert md → HTML only if we have md content
    if (doc.mdContent && doc.mdContent.trim() !== '') {
      doc.content = '<div>' + richRender(doc.mdContent) + '</div>';
    }
  }

  // 3. Update mode + toolbar buttons (no full re-render)
  state.canvas.editorMode = mode;
  saveState();

  // Toggle toolbar sections
  var wyTools = document.getElementById('wysiwyg-tools');
  var mdTools = document.getElementById('md-tools');
  if (wyTools) wyTools.style.display = mode === 'md' ? 'none' : 'contents';
  if (mdTools) mdTools.style.display = mode === 'md' ? 'contents' : 'none';

  var btnWy = document.getElementById('btn-mode-wysiwyg');
  var btnMd = document.getElementById('btn-mode-md');
  if (btnWy) btnWy.classList.toggle('on', mode !== 'md');
  if (btnMd) btnMd.classList.toggle('on', mode === 'md');

  // 4. Re-inject only the editor zone — AI panel stays untouched
  injectCanvasEditorZone(doc);
}

  ['both','src','prev'].forEach(function(s) {

}

function exportCanvasDoc(fmt) {
  const doc = getActiveDoc();
  if (!doc) return;
  let content, mimeType, ext;
  if (fmt === 'md') {
    // Export raw markdown
    content = state.canvas.editorMode === 'md'
      ? (document.getElementById('canvas-md-source')?.value || doc.mdContent || '')
      : (doc.mdContent || htmlToMd(doc.content || ''));
    mimeType = 'text/markdown'; ext = 'md';
  } else if (fmt === 'html') {
    const bodyContent = state.canvas.editorMode === 'md'
      ? richRender(doc.mdContent || '')
      : (document.getElementById('canvas-editor')?.innerHTML || doc.content || '');
    content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${doc.title}</title></head><body style="font-family:sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.6">${bodyContent}</body></html>`;
    mimeType = 'text/html'; ext = 'html';
  } else {
    const editor = document.getElementById('canvas-editor');
    content = editor ? editor.innerText : (doc.mdContent || '');
    mimeType = 'text/plain'; ext = 'txt';
  }
  const blob = new Blob([content], { type: mimeType });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (doc.title || 'document') + '.' + ext;
  a.click();
}

function printCanvasDoc() {
  const editor = document.getElementById('canvas-editor');

  const w = window.open('', '_blank');

}
